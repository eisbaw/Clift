# Clift CI: per-module proof verification + CImporter tests
#
# All logic lives in the Justfile — CI only calls nix develop + just recipes.
# To run locally: nix develop --command just ci

name: Clift Verification

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-library:
    name: Core Library (Clift/)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-core-${{ hashFiles('Clift/**/*.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-core-
            lake-${{ runner.os }}-
      - name: Build core library
        run: nix develop --command just build-lib

  importer-tests:
    name: CImporter Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run CImporter tests
        run: nix develop --command just ci-importer

  proof-hash-table:
    name: "Proof: Hash Table"
    needs: core-library
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-ht-${{ hashFiles('Examples/HashTableProof.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-ht-
      - name: Build hash table proof
        run: nix develop --command just ci-proof Examples.HashTableProof

  proof-rtos-queue:
    name: "Proof: RTOS Queue"
    needs: core-library
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-rq-${{ hashFiles('Examples/RtosQueueProof.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-rq-
      - name: Build RTOS queue proof
        run: nix develop --command just ci-proof Examples.RtosQueueProof

  proof-crypto-drivers:
    name: "Proof: SHA-256 + UART + DMA"
    needs: core-library
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-hw-${{ hashFiles('Examples/Sha256CoreProof.lean', 'Examples/UartDriverProof.lean', 'Examples/DmaBufferProof.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-hw-
      - name: Build hardware proofs
        run: |
          nix develop --command bash -c "
            just ci-proof Examples.Sha256CoreProof
            just ci-proof Examples.UartDriverProof
            just ci-proof Examples.DmaBufferProof
          "

  proof-data-structures:
    name: "Proof: RBTree + PQ + MemAlloc"
    needs: core-library
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-ds-${{ hashFiles('Examples/RbtreeProof.lean', 'Examples/PriorityQueueProof.lean', 'Examples/MemAllocProof.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-ds-
      - name: Build data structure proofs
        run: |
          nix develop --command bash -c "
            just ci-proof Examples.RbtreeProof
            just ci-proof Examples.PriorityQueueProof
            just ci-proof Examples.MemAllocProof
          "

  proof-networking:
    name: "Proof: Packet Parser + State Machine + seL4"
    needs: core-library
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-net-${{ hashFiles('Examples/PacketParserProof.lean', 'Examples/StateMachineProof.lean', 'Examples/Sel4CapProof.lean') }}
          restore-keys: |
            lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.lean') }}-net-
      - name: Build networking/OS proofs
        run: |
          nix develop --command bash -c "
            just ci-proof Examples.PacketParserProof
            just ci-proof Examples.StateMachineProof
            just ci-proof Examples.Sel4CapProof
          "

  # DISABLED: These jobs exceed free runner timeouts.
  # proof-ring-buffer: needs ~30m (20m limit)
  # proof-foundations: SystemCorrectness pulls full RB chain, needs ~25m (15m limit)

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Core sorry check + audit
        run: |
          nix develop --command bash -c "
            just ci-core-sorry
            just ci-audit
          "

  summary:
    name: Verification Summary
    needs: [core-library, importer-tests, proof-hash-table, proof-rtos-queue, proof-crypto-drivers, proof-data-structures, proof-networking, lint]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          echo "=== Clift Verification Complete ==="
